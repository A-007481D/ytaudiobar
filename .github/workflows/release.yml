name: Release

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    create-release:
        permissions:
            contents: write
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-20.04
                      platform: linux
                    - os: windows-latest
                      platform: windows

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Install dependencies (Ubuntu only)
              if: matrix.platform == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

            - name: Install frontend dependencies
              run: npm install

            - name: Get version from tag
              id: get_version
              shell: bash
              run: |
                  VERSION=${GITHUB_REF#refs/tags/v}
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

            - name: Verify signing secrets exist
              shell: bash
              run: |
                  if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
                    echo "❌ ERROR: TAURI_SIGNING_PRIVATE_KEY secret is not set!"
                    exit 1
                  else
                    echo "✅ TAURI_SIGNING_PRIVATE_KEY secret exists (length: ${#TAURI_SIGNING_PRIVATE_KEY})"
                  fi

                  if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
                    echo "❌ ERROR: TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret is not set!"
                    exit 1
                  else
                    echo "✅ TAURI_SIGNING_PRIVATE_KEY_PASSWORD secret exists"
                  fi
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

            - name: Build app
              env:
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              run: npm run tauri build

            - name: Create signed updater archives (Windows)
              if: matrix.platform == 'windows'
              shell: pwsh
              run: |
                  # Write private key to temp file
                  $keyFile = New-TemporaryFile
                  "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" | Out-File -FilePath $keyFile -Encoding utf8 -NoNewline

                  cd src-tauri/target/release/bundle/nsis
                  Get-ChildItem *.exe | ForEach-Object {
                    $exe = $_.Name
                    $zip = "$exe.zip"
                    Write-Host "Creating $zip with no compression"
                    & "C:\Program Files\7-Zip\7z.exe" a -tzip -mx=0 $zip $exe
                    Write-Host "Signing $zip"
                    npx @tauri-apps/cli signer sign $zip --private-key-path $keyFile --password "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
                  }

                  # Clean up key file
                  Remove-Item $keyFile -Force
                  Get-ChildItem

            - name: Create signed updater archives (Linux)
              if: matrix.platform == 'linux'
              shell: bash
              run: |
                  # Write private key to temp file
                  KEY_FILE=$(mktemp)
                  echo -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" > "$KEY_FILE"

                  cd src-tauri/target/release/bundle/appimage
                  for appimage in *.AppImage; do
                    echo "Creating ${appimage}.tar.gz"
                    tar czf "${appimage}.tar.gz" "$appimage"
                    echo "Signing ${appimage}.tar.gz"
                    npx @tauri-apps/cli signer sign "${appimage}.tar.gz" --private-key-path "$KEY_FILE" --password "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
                  done

                  # Clean up key file
                  rm -f "$KEY_FILE"
                  ls -la

            - name: Upload Release Assets (Windows)
              if: matrix.platform == 'windows'
              uses: softprops/action-gh-release@v1
              with:
                  files: |
                      src-tauri/target/release/bundle/nsis/*.exe
                      src-tauri/target/release/bundle/nsis/*.exe.zip
                      src-tauri/target/release/bundle/nsis/*.exe.zip.sig
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload Release Assets (Linux)
              if: matrix.platform == 'linux'
              uses: softprops/action-gh-release@v1
              with:
                  files: |
                      src-tauri/target/release/bundle/appimage/*.AppImage
                      src-tauri/target/release/bundle/appimage/*.tar.gz
                      src-tauri/target/release/bundle/appimage/*.tar.gz.sig
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    generate-update-manifest:
        needs: create-release
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Generate latest.json
              run: |
                  VERSION="${GITHUB_REF#refs/tags/v}"

                  # Download signature files from the release
                  WIN_SIG=$(curl -sL "https://github.com/ilyassan/ytaudiobar/releases/download/${GITHUB_REF#refs/tags/}/YTAudioBar_${VERSION}_x64-setup.exe.zip.sig" || echo "")
                  LINUX_SIG=$(curl -sL "https://github.com/ilyassan/ytaudiobar/releases/download/${GITHUB_REF#refs/tags/}/YTAudioBar_${VERSION}_amd64.AppImage.tar.gz.sig" || echo "")

                  cat > latest.json << EOF
                  {
                    "version": "$VERSION",
                    "notes": "Update available",
                    "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                    "platforms": {
                      "windows-x86_64": {
                        "signature": "$WIN_SIG",
                        "url": "https://github.com/ilyassan/ytaudiobar/releases/download/${GITHUB_REF#refs/tags/}/YTAudioBar_${VERSION}_x64-setup.exe.zip"
                      },
                      "linux-x86_64": {
                        "signature": "$LINUX_SIG",
                        "url": "https://github.com/ilyassan/ytaudiobar/releases/download/${GITHUB_REF#refs/tags/}/YTAudioBar_${VERSION}_amd64.AppImage.tar.gz"
                      }
                    }
                  }
                  EOF

            - name: Upload latest.json to Release
              uses: softprops/action-gh-release@v1
              with:
                  files: latest.json
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
